name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker test image
        run: docker build --target test -t dev-intelligence:test .

      - name: Run tests (SKIP_LLM=true per evitare download modello)
        run: |
          docker run --rm \
            -e SKIP_LLM=true \
            -e CACHE_DIR=/tmp/test-cache \
            dev-intelligence:test \
            python -m pytest tests/ -v --tb=short
